server:
  port: 8085

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/order_service
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      properties:
        spring:
          json:
            add:
              type:
                headers: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,refresh

  endpoint:
    health:
      show-details: always

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

metrics:
  tags:
    application: order-service

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.example.orderservice.feign: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    feign: DEBUG

  pattern:
    level: "%5p [order-service,%X{traceId:-},%X{spanId:-}]"

# =====================================
# RESILIENCE4J CONFIGURATION
# =====================================

resilience4j:

  circuitbreaker:
    instances:

      inventoryService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true

      productService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true

  retry:
    instances:

      inventoryService:
        maxAttempts: 3
        waitDuration: 2s

      productService:
        maxAttempts: 3
        waitDuration: 2s

  ratelimiter:
    instances:

      inventoryService:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 1s

      productService:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 1s

  bulkhead:
    instances:

      inventoryService:
        maxConcurrentCalls: 20
        maxWaitDuration: 1s

      productService:
        maxConcurrentCalls: 20
        maxWaitDuration: 1s

  timelimiter:
    instances:

      inventoryService:
        timeoutDuration: 5s
        cancelRunningFuture: true

      productService:
        timeoutDuration: 5s
        cancelRunningFuture: true
