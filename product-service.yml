server:
port: 8083

spring:
application:
name: product-service

datasource:
url: jdbc:postgresql://postgres:5432/product_service
username: postgres
password: root

jpa:
hibernate:
ddl-auto: update
show-sql: true

data:
redis:
host: redis
port: 6379
timeout: 60000

eureka:
client:
service-url:
defaultZone: http://eureka-server:8761/eureka

instance:
prefer-ip-address: true

management:
endpoints:
web:
exposure:
include: health,info,metrics,prometheus,refresh

endpoint:
health:
show-details: always

metrics:
tags:
application: product-service

logging:
level:
root: INFO
org.springframework.cache: TRACE

pattern:
level: "%5p [${spring.application.name:}]"

springdoc:
swagger-ui:
path: /swagger-ui.html

